services:
  mysql:
    image: mysql:8.4
    container_name: mini-12306-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mini_12306
      MYSQL_USER: mini_user
      MYSQL_PASSWORD: mini_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -umini_user -pmini_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
